version: '3.8'

services:
  # LibreChat - Chat UI
  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat
    ports:
      - "${LIBRECHAT_PORT:-3000}:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - MONGO_URI=mongodb://mongodb:27017/LibreChat
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-masterkey123}

      # LiteLLM Proxy Configuration
      - OPENAI_API_KEY=sk-litellm
      - OPENAI_REVERSE_PROXY=http://litellm:4000

      # App Configuration
      - APP_TITLE=Observability Analytics AI
      - ALLOW_REGISTRATION=true
      - ALLOW_SOCIAL_LOGIN=false
      - ALLOW_SOCIAL_REGISTRATION=false

      # JWT Configuration
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-change-this}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-your-refresh-secret-change-this}

      # File Upload (disable for workshop)
      - ENABLE_FILE_UPLOAD=false

    depends_on:
      - mongodb
      - meilisearch
      - litellm
    restart: unless-stopped
    volumes:
      - ./config/librechat.yaml:/app/librechat.yaml:ro
      - librechat_data:/app/client/public/images
    networks:
      - observability-net

  # MongoDB - LibreChat Database
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=LibreChat
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - observability-net

  # MeiliSearch - Search Engine for LibreChat
  meilisearch:
    image: getmeili/meilisearch:v1.5
    container_name: meilisearch
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-masterkey123}
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meilisearch_data:/meili_data
    restart: unless-stopped
    networks:
      - observability-net

  # LiteLLM - LLM Proxy with Langfuse Integration
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    ports:
      - "4000:4000"
    environment:
      # LiteLLM Configuration
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-1234}
      - DATABASE_URL=postgresql://litellm:litellm123@postgres:5432/litellm

      # LLM Provider Keys
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

      # Langfuse Configuration
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}

      # ClickHouse Configuration
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST}
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT:-8443}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DATABASE:-default}
      - CLICKHOUSE_SECURE=true

    volumes:
      - ./config/litellm_config.yaml:/app/config.yaml:ro
      - ./config/system_prompt.txt:/app/system_prompt.txt:ro
    command: --config /app/config.yaml --detailed_debug
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - observability-net

  # PostgreSQL - LiteLLM Database
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=litellm
      - POSTGRES_PASSWORD=litellm123
      - POSTGRES_DB=litellm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - observability-net

volumes:
  mongodb_data:
  meilisearch_data:
  postgres_data:
  librechat_data:

networks:
  observability-net:
    driver: bridge
