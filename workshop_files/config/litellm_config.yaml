# LiteLLM Configuration for Observability Workshop
# This config sets up LLM proxying with Langfuse tracing and ClickHouse integration

# General Settings
general_settings:
  master_key: ${LITELLM_MASTER_KEY}
  database_url: ${DATABASE_URL}

  # Enable detailed logging for workshop debugging
  set_verbose: true

  # Langfuse integration for full observability
  langfuse_public_key: ${LANGFUSE_PUBLIC_KEY}
  langfuse_secret_key: ${LANGFUSE_SECRET_KEY}
  langfuse_host: ${LANGFUSE_HOST}

  # Enable success/failure callbacks
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]

# Model Definitions
model_list:
  # OpenAI Models (if using OpenAI)
  - model_name: gpt-4-turbo
    litellm_params:
      model: gpt-4-turbo-preview
      api_key: ${OPENAI_API_KEY}
      max_tokens: 4096
      temperature: 0.1
      metadata:
        tags: ["workshop", "observability", "production"]
    model_info:
      mode: chat
      supports_function_calling: true

  - model_name: gpt-4o
    litellm_params:
      model: gpt-4o
      api_key: ${OPENAI_API_KEY}
      max_tokens: 4096
      temperature: 0.1
      metadata:
        tags: ["workshop", "observability", "fast"]
    model_info:
      mode: chat
      supports_function_calling: true

  - model_name: gpt-3.5-turbo
    litellm_params:
      model: gpt-3.5-turbo
      api_key: ${OPENAI_API_KEY}
      max_tokens: 4096
      temperature: 0.1
      metadata:
        tags: ["workshop", "observability", "lite"]
    model_info:
      mode: chat
      supports_function_calling: true

  # Anthropic Models (if using Claude)
  - model_name: claude-3-5-sonnet
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20241022
      api_key: ${ANTHROPIC_API_KEY}
      max_tokens: 4096
      temperature: 0.1
      metadata:
        tags: ["workshop", "observability", "production"]
    model_info:
      mode: chat
      supports_function_calling: true

  - model_name: claude-3-opus
    litellm_params:
      model: anthropic/claude-3-opus-20240229
      api_key: ${ANTHROPIC_API_KEY}
      max_tokens: 4096
      temperature: 0.1
      metadata:
        tags: ["workshop", "observability", "advanced"]
    model_info:
      mode: chat
      supports_function_calling: true

  - model_name: claude-3-haiku
    litellm_params:
      model: anthropic/claude-3-haiku-20240307
      api_key: ${ANTHROPIC_API_KEY}
      max_tokens: 4096
      temperature: 0.1
      metadata:
        tags: ["workshop", "observability", "lite"]
    model_info:
      mode: chat
      supports_function_calling: true

  # Google Gemini Models (if using Google)
  - model_name: gemini-1.5-pro
    litellm_params:
      model: gemini/gemini-1.5-pro
      api_key: ${GOOGLE_API_KEY}
      max_tokens: 4096
      temperature: 0.1
      metadata:
        tags: ["workshop", "observability", "production"]
    model_info:
      mode: chat
      supports_function_calling: true

  - model_name: gemini-1.5-flash
    litellm_params:
      model: gemini/gemini-1.5-flash
      api_key: ${GOOGLE_API_KEY}
      max_tokens: 4096
      temperature: 0.1
      metadata:
        tags: ["workshop", "observability", "fast"]
    model_info:
      mode: chat
      supports_function_calling: true

  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-pro
      api_key: ${GOOGLE_API_KEY}
      max_tokens: 4096
      temperature: 0.1
      metadata:
        tags: ["workshop", "observability", "lite"]
    model_info:
      mode: chat
      supports_function_calling: true

# Router Settings (for load balancing and fallbacks)
router_settings:
  routing_strategy: simple-shuffle

  # Model fallbacks
  fallbacks:
    - gpt-4-turbo: ["gpt-4o", "claude-3-5-sonnet", "gemini-1.5-pro"]
    - claude-3-5-sonnet: ["gpt-4-turbo", "gpt-4o", "gemini-1.5-pro"]
    - gemini-1.5-pro: ["claude-3-5-sonnet", "gpt-4-turbo"]

  # Retry settings
  num_retries: 2
  retry_after: 2

  # Timeout settings (in seconds)
  timeout: 300

  # Rate limiting
  allowed_fails: 3
  cooldown_time: 60

# Callbacks & Integrations
litellm_settings:
  # Langfuse tracing
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]

  # Detailed request/response logging
  set_verbose: true

  # Drop sensitive params from logs
  drop_params: true

  # JSON logs for better parsing
  json_logs: true

  # Cache settings (optional, improves performance)
  cache: false  # Set to true for production

  # Context window fallbacks
  context_window_fallbacks:
    - model: gpt-4-turbo
      fallbacks: [gpt-4o, claude-3-5-sonnet]

# Environment-specific settings
environment_variables:
  # ClickHouse connection
  CLICKHOUSE_HOST: ${CLICKHOUSE_HOST}
  CLICKHOUSE_PORT: ${CLICKHOUSE_PORT}
  CLICKHOUSE_USER: ${CLICKHOUSE_USER}
  CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
  CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE}
  CLICKHOUSE_SECURE: "true"

# Custom system prompt
# This will be prepended to all user messages
default_prompts:
  system_prompt: |
    You are an expert observability analyst helping engineers query OpenTelemetry data in ClickHouse.

    When users ask questions about service performance, errors, or latency:
    1. Convert their question to a precise ClickHouse SQL query
    2. Use the otel_traces, otel_metrics, otel_logs, and otel_services tables
    3. Remember Duration is in nanoseconds (divide by 1000000 for milliseconds)
    4. Always include appropriate time filters (default to last 1 hour)
    5. Format results clearly with proper aliases and rounding

    Provide actionable insights, not just data.

# Budget & Cost Controls (optional)
# Useful for workshops to prevent runaway costs
budget_settings:
  # Max budget per user (in USD)
  # Uncomment to enable
  # max_budget: 10.0

  # Budget duration
  # budget_duration: "24h"

  # Soft vs hard limits
  # soft_budget: 5.0  # Warning threshold

# API Settings
api_settings:
  # Allow users to see available models
  model_list: true

  # Health check endpoint
  health_check: true

  # CORS settings (for browser access)
  cors_origins: ["*"]

# Logging
logging:
  level: INFO  # DEBUG for workshop troubleshooting

  # Log to file (optional)
  # log_file: /var/log/litellm/litellm.log

  # Structured logging
  json_logs: true

# Function Calling (for SQL tool use)
function_calling:
  enabled: true

  # Define SQL execution function
  functions:
    - name: execute_clickhouse_query
      description: Execute a SQL query against ClickHouse and return results
      parameters:
        type: object
        properties:
          query:
            type: string
            description: The SQL query to execute
          format:
            type: string
            enum: ["JSON", "CSV", "Table"]
            description: Output format for results
        required: ["query"]

# Caching (optional, improves performance)
cache_settings:
  type: redis  # or "local" for in-memory
  # Uncomment for Redis
  # redis_host: redis
  # redis_port: 6379
  # ttl: 3600  # Cache TTL in seconds

# Security
security:
  # Disable for workshop (enable for production)
  enforce_user_auth: false

  # API key requirements
  # require_api_key: true

  # Allowed IPs (optional)
  # allowed_ips: ["10.0.0.0/8"]

# Monitoring
monitoring:
  # Prometheus metrics endpoint
  prometheus: true
  prometheus_port: 9090

  # Health check interval
  health_check_interval: 60

# Workshop-Specific Settings
workshop:
  # Enable detailed tracing for learning
  detailed_traces: true

  # Show SQL queries in responses
  show_queries: true

  # Timeout for long-running queries
  query_timeout: 60

  # Max rows returned (prevent overwhelming output)
  max_rows: 100

# Default model for LibreChat
# This is what will be used if no model is specified
default_model: claude-3-5-sonnet  # or gpt-4-turbo
